# Global config (theme, format, resources)
project:
  type: website
  output-dir: _site
  resources:
    - data/processed/      # Ship the JSON data files with the site
    - styles.css

website:
  title: "Genre Decoded"
  navbar: false            # No navbar — full-screen scrollytelling

format:
  html:
    theme: none            # We bring our own CSS entirely
    css: styles.css
    toc: false
    smooth-scroll: true
    page-layout: full      # No Quarto sidebar/margin — full canvas
    include-in-header:
      text: |
        <link rel="icon" href="data:,">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

execute:
  echo: false              # Don't show code on the page
  warning: false
  freeze: false            # Always re-render (data may change)
